<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2/dist/echarts-gl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-liquidfill@3/dist/echarts-liquidfill.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2/dist/echarts-wordcloud.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts/map/js/china.js"></script>
    <style>
        :root {
            --primary-color: #5647a1;
            --secondary-color: #6a6cde;
            --background-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --text-color: #333;
            --text-color-light: #fff;
            --card-background: #ffffff;
            --shadow-color: rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
            background: var(--background-gradient);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-background);
            border-radius: 16px;
            box-shadow: 0 10px 50px var(--shadow-color);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: var(--text-color-light);
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.8em;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.2em;
        }

        .chart-container {
            padding: 30px;
            position: relative;
        }

        #main {
            width: 100%;
            max-width: {{.Width}}px;
            height: {{.Height}}px;
            margin: 0 auto;
            border-radius: 8px;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
            font-size: 1.1em;
        }

        .loading::after {
            content: '';
            display: block;
            width: 30px;
            height: 30px;
            margin: 15px auto 0;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #666;
            border-top: 1px solid #e9ecef;
            font-size: 0.9em;
        }

        .config-info {
            margin: 0 30px 30px;
            padding: 20px;
            border-radius: 8px;
            background: #f8f9fa;
            border-left: 5px solid var(--primary-color);
        }

        .config-info h3 {
            color: var(--text-color);
            margin-bottom: 15px;
            font-size: 1.3em;
            font-weight: 500;
        }

        .config-toggle {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background 0.3s ease;
        }
        
        .config-toggle:hover {
            background: var(--secondary-color);
        }

        .config-content {
            display: none;
            background: white;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #ddd;
            max-height: 250px;
            overflow-y: auto;
        }

        .config-content pre {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #2b2b2b;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { padding: 30px 20px; }
            .header h1 { font-size: 2.2em; }
            .chart-container { padding: 20px; }
            #main { width: 100%; height: 400px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <h1>{{.Title}}</h1>
        <p>Data Visualization Chart</p>
    </header>

    <div class="chart-container">
        <div class="loading">Loading chart...</div>
        <div id="main"></div>
    </div>

    <div class="config-info">
        <h3>Chart Configuration Details</h3>
        <button class="config-toggle" onclick="toggleConfig()">Show/Hide Configuration</button>
        <div class="config-content" id="configContent">
            <pre>{{.OptionStr}}</pre>
        </div>
    </div>

    <footer class="footer">
        <p>Generated by the ECharts MCP Server • <span id="generation-date"></span></p>
    </footer>
</div>

<script>
    document.getElementById('generation-date').textContent = new Date().toLocaleString('en-US', { timeZone: 'Asia/Shanghai' });

    // Initialize the ECharts instance
    var chartDom = document.getElementById('main');
    var myChart = echarts.init(chartDom);
    var option;

    // Hide the loading animation
    document.querySelector('.loading').style.display = 'none';
    chartDom.style.display = 'block';

    // Chart configuration
    option = {{.Option}};

    // Enhanced options - add default interactive features
    if (option) {
        if (!option.toolbox) {
            option.toolbox = {
                show: true,
                feature: {
                    saveAsImage: { title: 'Save Image' },
                    restore: { title: 'Reset View' },
                    dataView: { readOnly: false, title: 'Data View' },
                    magicType: { type: ['line', 'bar', 'stack'], title: { line: 'Line Chart', bar: 'Bar Chart', stack: 'Stacked' } },
                    dataZoom: {
                        title: { zoom: 'Area Zoom', back: 'Reset Zoom' }
                    }
                }
            };
        }

        if (option.series && !option.tooltip) {
            option.tooltip = {
                trigger: 'axis',
                axisPointer: {
                    type: 'cross',
                    label: {
                        backgroundColor: '#6a7985'
                    }
                }
            };
        }
    }


    // Render the chart with the provided configuration and data
    myChart.setOption(option);

    // Responsive resizing
    window.addEventListener('resize', function() {
        myChart.resize();
    });

    // Toggle configuration panel
    function toggleConfig() {
        var content = document.getElementById('configContent');
        if (content.style.display === 'none' || content.style.display === '') {
            content.style.display = 'block';
        } else {
            content.style.display = 'none';
        }
    }

    // Add chart click handler
    myChart.on('click', function(params) {
        console.log('Chart click event:', params);
        if (params.data) {
            alert('You clicked: ' + (params.name || params.data.name || JSON.stringify(params.data)));
        }
    });

    // Performance monitoring
    console.log('ECharts Version:', echarts.version);
    console.log('Chart Option:', option);

    // Error handling
    window.addEventListener('error', function(event) {
        console.error('Page error:', event);
        var loading = document.querySelector('.loading');
        loading.innerHTML = '❌ Failed to load the chart. Please check the configuration or refresh the page.';
        loading.style.display = 'block';
    }, true);
</script>
</body>
</html>
