name: Docker Image CI

on:
  push:
    branches: [ "StreamableHTTP" ]
  pull_request:
    branches: [ "StreamableHTTP" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag mcp-server-echart:latest
